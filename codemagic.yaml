workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Set up local.properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Build debug APK
        script: |
          cd $CM_BUILD_DIR
          chmod +x gradlew || true
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - andrey228131@yandex.ru
        notify:
          success: true
          failure: true

  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR/ios
          xcodegen generate
      - name: Build iOS app (unsigned)
        script: |
          cd $CM_BUILD_DIR/ios
          xcodebuild build \
            -project TusurApp.xcodeproj \
            -scheme TusurApp \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS="arm64" \
            -derivedDataPath build
      - name: Create IPA
        script: |
          cd $CM_BUILD_DIR/ios
          APP_PATH=$(find build -name "TusurApp.app" -o -name "ТУСУР.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "*.app" | head -1)
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r TusurApp.ipa Payload
          rm -rf Payload
    artifacts:
      - ios/TusurApp.ipa
      - ios/build/Build/Products/**/*.app
    publishing:
      email:
        recipients:
          - andrey228131@yandex.ru
          - damirrizaev9@gmail.com
        notify:
          success: true
          failure: true
